services:
  app:
    build:
      context: .
      target: runner
    env_file:
      - path: ${ENV_FILE:-.env}
        required: true
    ports:
      - "127.0.0.1:8000:3000"
    restart: unless-stopped
    init: true
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  migrate:
    build:
      context: .
      target: migrator
    env_file:
      - path: ${ENV_FILE:-.env}
        required: true
    profiles: ["migrate"]

  knowledge-extractor:
    build:
      context: .
      target: worker
    command: ["node", "--conditions", "react-server", "--import", "tsx", "scripts/knowledge-extraction-worker.ts"]
    env_file:
      - path: ${ENV_FILE:-.env}
        required: true
    restart: unless-stopped
    init: true

  knowledge-indexing:
    build:
      context: .
      target: worker
    command: ["node", "--conditions", "react-server", "--import", "tsx", "scripts/knowledge-indexing-worker.ts"]
    env_file:
      - path: ${ENV_FILE:-.env}
        required: true
    restart: unless-stopped
    init: true
