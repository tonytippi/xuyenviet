<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>XuyenViet - Trạng thái trống sau đăng nhập</title>
  <style>
    :root {
      --green: #14532d;
      --route: #0f766e;
      --purple: #8b5cf6;
      --amber: #d97706;
      --ink: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --soft: #f8fafc;
      --sidebar: #f7f7f3;
      --active: #e8f3ec;
      --shadow: 0 20px 70px rgba(31,41,55,.12);
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; color: var(--ink); background: #fff; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    button, textarea { font: inherit; }
    button { cursor: pointer; }

    .app { display: grid; grid-template-columns: 276px minmax(0, 1fr); height: 100vh; overflow: hidden; }
    .sidebar { display: grid; grid-template-rows: auto auto minmax(0, 1fr) auto; gap: 14px; padding: 14px 12px; border-right: 1px solid var(--line); background: var(--sidebar); }
    .brand { display: flex; align-items: center; justify-content: space-between; padding: 4px 4px 0; }
    .brand-left { display: flex; align-items: center; gap: 9px; font-weight: 850; letter-spacing: -.03em; }
    .logo { display: grid; width: 34px; height: 34px; place-items: center; border-radius: 12px; background: linear-gradient(135deg, var(--green), var(--route)); color: white; font-size: 13px; font-weight: 900; }
    .icon-button { display: grid; width: 34px; height: 34px; place-items: center; border: 1px solid transparent; border-radius: 11px; background: transparent; color: var(--muted); }
    .icon-button:hover { background: white; border-color: var(--line); }
    .new-chat { display: flex; align-items: center; justify-content: center; gap: 8px; min-height: 42px; border: 0; border-radius: 13px; background: var(--green); color: white; font-weight: 800; }
    .empty-sidebar { display: grid; place-items: center; min-height: 220px; padding: 18px; color: var(--muted); text-align: center; font-size: 13px; }
    .empty-sidebar img { width: 34px; height: 34px; margin-bottom: 10px; opacity: .72; }
    .sidebar-footer { display: grid; gap: 4px; padding-top: 10px; border-top: 1px solid var(--line); }
    .footer-row { display: flex; justify-content: space-between; align-items: center; min-height: 38px; padding: 7px 8px; border-radius: 12px; color: var(--ink); font-size: 13px; text-decoration: none; }
    .footer-row:hover { background: white; }

    .main { display: grid; grid-template-rows: auto minmax(0, 1fr); min-width: 0; background: radial-gradient(circle at 50% 20%, rgba(20,83,45,.1), transparent 28%), #fff; }
    .topbar { display: flex; align-items: center; justify-content: space-between; min-height: 58px; padding: 10px 18px; border-bottom: 1px solid var(--line); }
    .topbar-title strong { display: block; font-size: 14px; }
    .topbar-title span { display: block; color: var(--muted); font-size: 12px; }
    .account { display: grid; width: 34px; height: 34px; place-items: center; border-radius: 999px; background: var(--active); color: var(--green); font-weight: 850; }

    .empty-chat { display: grid; place-items: center; overflow: auto; padding: 38px 22px; text-align: center; }
    .empty-inner { width: min(100%, 780px); }
    h1 { margin: 0; font-size: clamp(38px, 7vw, 74px); line-height: .98; letter-spacing: -.075em; }
    .subtitle { max-width: 560px; margin: 18px auto 0; color: var(--muted); font-size: 18px; line-height: 1.55; }
    .starter-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; margin: 30px auto 0; text-align: left; }
    .starter { display: grid; grid-template-columns: 36px minmax(0, 1fr); gap: 12px; align-items: center; min-height: 76px; padding: 14px; border: 1px solid var(--line); border-radius: 20px; background: rgba(255,255,255,.82); box-shadow: 0 12px 36px rgba(31,41,55,.06); }
    .starter img { width: 30px; height: 30px; }
    .starter strong { display: block; font-size: 14px; }
    .starter span { display: block; margin-top: 2px; color: var(--muted); font-size: 12px; }
    .composer { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 10px; width: min(100%, 760px); margin: 32px auto 0; padding: 12px; border: 1px solid var(--line); border-radius: 28px; background: rgba(255,255,255,.96); box-shadow: var(--shadow); text-align: left; }
    textarea { min-height: 56px; resize: vertical; border: 0; outline: 0; background: transparent; color: var(--ink); font-size: 16px; }
    .send { width: 52px; height: 52px; border: 0; border-radius: 18px; background: var(--green); color: white; font-size: 21px; font-weight: 900; }

    @media (max-width: 1120px) { .app { grid-template-columns: 74px minmax(0, 1fr); } .brand-left span, .new-chat span:last-child, .sidebar-footer, .empty-sidebar span { display: none; } .sidebar { padding: 14px 8px; } }
    @media (max-width: 720px) { .app { display: block; } .sidebar { display: none; } .starter-grid { grid-template-columns: 1fr; } .composer { grid-template-columns: 1fr; } .send { width: 100%; } }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" aria-label="Sidebar navigation">
      <div class="brand"><div class="brand-left"><span class="logo">XV</span><span>XuyenViet</span></div><button class="icon-button" type="button">☰</button></div>
      <button class="new-chat" type="button"><span>＋</span><span>Trò chuyện mới</span></button>
      <div class="empty-sidebar"><div><img src="https://img.icons8.com/?id=3726&amp;format=png&amp;size=48" alt="" /><span>Chưa có cuộc trò chuyện. Hãy hỏi câu đầu tiên.</span></div></div>
      <div class="sidebar-footer"><a class="footer-row" href="#"><span>Riêng tư</span><span>›</span></a><a class="footer-row" href="#"><span>Admin</span><span>↗</span></a><a class="footer-row" href="#"><span>Tony</span><span>⎋</span></a></div>
    </aside>

    <main class="main">
      <header class="topbar"><div class="topbar-title"><strong>Trò chuyện mới</strong><span>Chưa có nội dung</span></div><div class="account">T</div></header>
      <section class="empty-chat">
        <div class="empty-inner">
          <h1>Mình sẽ đi đâu?</h1>
          <p class="subtitle">Bắt đầu bằng một câu hỏi tự nhiên. XuyenViet sẽ giúp bạn lên route, chọn điểm dừng, nơi ở và những điều cần kiểm chứng.</p>

          <form class="composer">
            <textarea aria-label="Nhập câu hỏi" placeholder="Hỏi XuyenViet về chuyến đi đường bộ ở Việt Nam..."></textarea>
            <button class="send" type="submit">→</button>
          </form>

          <div class="starter-grid">
            <button class="starter" type="button"><img src="https://img.icons8.com/?id=37078&amp;format=png&amp;size=48" alt="" /><span><strong>Lên route</strong><span>Hà Nội → Huế trong 5 ngày</span></span></button>
            <button class="starter" type="button"><img src="https://img.icons8.com/?id=12338&amp;format=png&amp;size=64" alt="" /><span><strong>Tìm nơi ở</strong><span>khu nào tiện cho gia đình</span></span></button>
            <button class="starter" type="button"><img src="https://img.icons8.com/?id=13800&amp;format=png&amp;size=48" alt="" /><span><strong>Điểm dừng</strong><span>nghỉ ăn, chơi nhẹ, trẻ em</span></span></button>
            <button class="starter" type="button"><img src="https://img.icons8.com/?id=742&amp;format=png&amp;size=48" alt="" /><span><strong>Kiểm tra nguồn</strong><span>curated, official, web</span></span></button>
          </div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
